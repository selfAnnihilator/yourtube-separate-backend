services:
  - type: web
    name: yourtube-backend
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: DB_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
